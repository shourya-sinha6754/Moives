<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practice Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .login-box {
            background: #2f3640;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #00a8ff;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0097e6;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #4cd137;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login Panel</h2>
    <form id="loginForm">
        <label>Username</label>
        <input type="text" id="username" required>

        <label>Password</label>
        <input type="password" id="password" required>

        <button type="submit">Login</button>
    </form>

    <div class="message" id="message"></div>
</div>

<script>
    const correctUsername = "iamshourya_kanha";
    const correctPassword = "Kanha@2050";

    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        const msg = document.getElementById("message");

        if (user === correctUsername && pass === correctPassword) {
            msg.textContent = "Login successful!";
            msg.className = "message success";
        } else if (user !== correctUsername) {
            msg.textContent = "Invalid username";
            msg.className = "message error";
        } else {
            msg.textContent = "Incorrect password";
            msg.className = "message error";
        }
    });
</script>

</body>
</html>
